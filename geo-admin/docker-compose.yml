services:
  postgres:
    image: postgres:16-alpine
    container_name: geo-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geo_admin}
      POSTGRES_USER: ${POSTGRES_USER:-geo_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geo_admin_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geo_admin} -d ${POSTGRES_DB:-geo_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./api-server
    container_name: geo-admin-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://geo_admin:geo_admin_password@postgres:5432/geo_admin?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      API_PORT: ${API_PORT:-3001}
      LLMS_STORAGE_DIR: ${LLMS_STORAGE_DIR:-/app/storage/llms}
      SITEMAP_STORAGE_DIR: ${SITEMAP_STORAGE_DIR:-/app/storage/sitemap}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://www.yfyk.com}
    ports:
      - "3001:3001"
    volumes:
      - llms_data:/app/storage/llms
      - sitemap_data:/app/storage/sitemap
    depends_on:
      postgres:
        condition: service_healthy

  admin-web:
    build:
      context: ./admin-web
    container_name: geo-admin-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api-server:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api-server

volumes:
  postgres_data:
  llms_data:
  sitemap_data:
